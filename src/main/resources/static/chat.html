<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zeChat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #fff;
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 15px;
        }

        .message.user {
            align-self: flex-end;
            background: #007aff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #fff;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.assistant .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #333;
            animation: blink 0.8s infinite;
            vertical-align: text-bottom;
            margin-left: 1px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .input-area {
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 42px;
            max-height: 120px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus {
            border-color: #007aff;
        }

        .input-area button {
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .input-area button:hover { background: #005ecb; }
        .input-area button:disabled { background: #b0b0b0; cursor: not-allowed; }

        @media (max-width: 600px) {
            .message { max-width: 85%; }
            .input-area { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">zeChat</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <textarea id="input" rows="1" placeholder="输入消息..." autofocus></textarea>
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');

        // 自动调整输入框高度
        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        });

        // Enter 发送，Shift+Enter 换行
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            // 显示用户消息
            appendMessage('user', message);
            inputEl.value = '';
            inputEl.style.height = 'auto';
            sendBtn.disabled = true;

            // 创建助手消息容器
            const assistantDiv = appendMessage('assistant', '');
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            assistantDiv.appendChild(cursor);

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: message
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    // 解析 SSE 格式: data:xxx\n\n
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const data = line.substring(5);
                            fullText += data;
                            assistantDiv.textContent = fullText;
                            assistantDiv.appendChild(cursor);
                            scrollToBottom();
                        }
                    }
                }

                // 移除光标
                cursor.remove();
            } catch (err) {
                assistantDiv.textContent = '发送失败: ' + err.message;
                cursor.remove();
            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }
    </script>
</body>
</html>
